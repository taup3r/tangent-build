<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tangent RPG - Shop</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/weaponShop.css">
</head>

<body>

  <div class="wrapper">

    <div class="container">

      <h1>Weapon Shop</h1>
      <div id="shopList"></div>
      <button onclick={
        const name = params.get("player");
        window.location.href=`town.html?player=${encodeURIComponent(name)}`;
      }>Back</button>

    </div>

  </div>

  <script type="module" src="js/weaponShop.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("player");
    history.pushState(null, "", location.href);
    window.onpopstate = function () {
      window.location.href = `weaponshop.html?player=${encodeURIComponent(name)}`;
    };
  </script>
</body>
</html>
