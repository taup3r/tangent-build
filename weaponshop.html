<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tangent RPG - Shop</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/weaponShop.css">
  <link rel="stylesheet" href="css/components.css">
</head>

<body>

  <!-- HEADER -->
  <div id="header-component-container"></div>
  <script>
    fetch("header-component.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("header-component-container").innerHTML = html;
    });
  </script>

  <div class="wrapper">

    <div class="container">

      <h1>Weapon Shop</h1>
      <div id="shopList"></div>
      <button id="backButton">Back</button>

    </div>

  </div>

   <!-- Compare Modal -->
  <div id="compare-modal-container"></div>
  <script>
    fetch("compare-modal.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("compare-modal-container").innerHTML = html;
    });
  </script>

  <script type="module" src="js/weaponShop.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("player");
    history.pushState(null, "", location.href);
    window.onpopstate = function () {
      window.location.href = `weaponshop.html?player=${encodeURIComponent(name)}`;
    };
  </script>
</body>
</html>
