<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tangent RPG - Shop</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/weaponShop.css">
</head>

<body>

  <div class="wrapper">

    <div class="container">

      <h1>Weapon Shop</h1>
      <div id="shopList"></div>
      <button id="backButton">Back</button>

    </div>

  </div>

  <!-- COMPARE WEAPON MODAL -->
  <div id="compareWeaponModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>Compare Weapons</h2>

      <h3>Current Weapon</h3>
      <div class="enemy-profile-row">
        <span id="compareCurrentName" class="profile-value"></span>
      </div>
      <div class="enemy-profile-row">
        <span class="profile-label">Damage:</span>
        <span id="compareCurrentDamage" class="profile-value"></span>
      </div>
      <div class="enemy-profile-row">
        <span class="profile-label">Modifiers:</span>
        <span id="compareCurrentStats" class="profile-value"></span>
      </div>

      <h3>New Weapon</h3>
      <div class="enemy-profile-row">
        <span id="compareEnemyName" class="profile-value"></span>
      </div>
      <div class="enemy-profile-row">
        <span class="profile-label">Damage:</span>
        <span id="compareEnemyDamage" class="profile-value"></span>
      </div>
      <div class="enemy-profile-row">
        <span class="profile-label">Modifiers:</span>
        <span id="compareEnemyStats" class="profile-value"></span>
      </div>

      <div style="display:flex; gap:12px; justify-content:center; margin-top:20px;">
        <button id="compareEquipBtn" class="modal-button">Equip</button>
        <button id="compareCancelBtn" class="modal-button">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/weaponShop.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("player");
    history.pushState(null, "", location.href);
    window.onpopstate = function () {
      window.location.href = `weaponshop.html?player=${encodeURIComponent(name)}`;
    };
  </script>
</body>
</html>
