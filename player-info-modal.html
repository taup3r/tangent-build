<div id="playerModal" class="modal" style="display:none;">
  <div class="modal-content player-info-box">

    <!-- Header: Player Name -->
    <h2 id="playerInfoName" class="player-info-header"></h2>

    <!-- Portrait -->
    <img id="playerInfoPortrait" class="player-info-portrait" />

    <!-- Level -->
    <div class="player-info-subheader">
        Lv <span id="playerInfoLevel"></span> • Exp <span id="playerInfoExp"></span>
    </div>
    <div class="player-info-subheader">
      <span id="playerInfoGold"></span> Gold • <span id="playerInfoReputation"></span> Rep
    </div>

    <!-- Stats Grid -->
    <div class="player-info-stats">
      <div><b>STR:</b> <span id="playerInfoSTR"></span></div>
      <div><b>DEX:</b> <span id="playerInfoDEX"></span></div>
      <div><b>AGI:</b> <span id="playerInfoAGI"></span></div>
      <div><b>CON:</b> <span id="playerInfoCON"></span></div>
    </div>

    <div class="derived-list">
      <div class="derived-row">
        <div class="derived-label">Damage Adjust</div>
        <div id="derivedDamage" class="derived-value">+0</div>
      </div>

      <div class="derived-row">
        <div class="derived-label">Damage Reduction</div>
        <div id="derivedDamageRedux" class="derived-value">-0</div>
      </div>

      <div class="derived-row">
        <div class="derived-label">Hit Chance</div>
        <div id="derivedHit" class="derived-value">0%</div>
      </div>

      <div class="derived-row">
        <div class="derived-label">Evade Chance</div>
        <div id="derivedEvade" class="derived-value">0%</div>
      </div>

      <div class="derived-row">
        <div class="derived-label">Health Points</div>
        <div id="derivedHP" class="derived-value">0</div>
      </div>
    </div>

    <!-- Weapon Block -->
    <div class="player-info-weapon">
      <div class="weapon-label">Weapon</div>
      <h3 id="playerProfileWeapon" class="weapon-name"></h3>
      <div id="playerProfileWeaponDamage" class="weapon-damage"></div>
      <div id="playerProfileWeaponStats" class="weapon-mods"></div>
      <div id="playerProfileWeaponLore" class="player-info-lore"></div>
    </div>

    <button id="playerInfoCloseBtn" class="close-btn">Close</button>
  </div>
</div>
