<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tangent RPG – Town</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/town.css">
</head>

<body>
    <!-- HEADER -->
  <div class="game-header">
    <div class="header-left">
      <span class="header-icon">⚔️</span>
      <span id="battleHeader" class="header-title"></span>
    </div>

    <div class="header-right">
      <span id="playerLevelDisplay">Lv 1</span>
      <span id="playerExpDisplay">EXP: 0 / 20</span>
    </div>
  </div>

  <div id="townWrapper">

    <h1 class="town-title">Wayfarer’s Rest</h1>

    <!-- Randomized Button Container -->
    <div id="randomArea"></div>

    <!-- Scrolling Lore Text -->
    <div id="loreScroller">
      <span id="loreText"></span>
    </div>

    <!-- Explore Button (fixed bottom) -->
    <button id="exploreBtn" class="explore-btn">Explore</button>

  </div>

  <!-- Stats Modal -->
  <div id="statModal" class="modal" style="display:none;">
    <div class="modal-content stats-iframe-box">
      <iframe id="statsFrame" src="" class="stats-iframe"></iframe>
    </div>
  </div>

  <script type="module" src="js/town.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("player");
    history.pushState(null, "", location.href);
    window.onpopstate = function () {
      window.location.href = `town.html?player=${encodeURIComponent(name)}`; 
    };
  </script>
</body>
</html>
