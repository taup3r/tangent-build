<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tangent RPG – Town</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/town.css">
</head>

<body>

  <div id="townWrapper">

    <div id="townContainer">

      <h1 class="town-title">Wayfarer’s Rest</h1>
      <p class="town-subtitle">A quiet refuge between battles.</p>

      <div class="town-buttons">
        <button id="statButton" class="town-btn train" style="display:none;">
          Train Stats
        </button>
        <button id="battleBtn" class="town-btn">Battle Random Encounters</button>
        <button id="exploreBtn" class="town-btn explore">Explore Dungeon</button>
      </div>

    </div>

  </div>

  <script type="module" src="js/town.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("player");
    history.pushState(null, "", location.href);
    window.onpopstate = function () {
      window.location.href = `town.html?player=${encodeURIComponent(name)}`; 
    };
  </script>
</body>
</html>
