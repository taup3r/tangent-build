<div id="stats-modal" class="modal" style="display:none;">
  <div class="modal-content">
    <h1 class="stats-title">Allocate Stats</h1>

    <p class="stats-available">
      Available Points: <span id="statPointsDisplay"></span>
    </p>

    <div class="stat-block">
      <div class="stat-row">
        <span class="stat-label">STR</span>
        <div class="stat-controls">
          <button class="stat-btn minus" data-stat="STR">−</button>
          <span id="statValueSTR" class="stat-value"></span>
          <button class="stat-btn plus" data-stat="STR">+</button>
        </div>
      </div>
      <p class="stat-desc">Strength — increases damage.</p>
    </div>

    <div class="stat-block">
      <div class="stat-row">
        <span class="stat-label">DEX</span>
        <div class="stat-controls">
          <button class="stat-btn minus" data-stat="DEX">−</button>
          <span id="statValueDEX" class="stat-value"></span>
          <button class="stat-btn plus" data-stat="DEX">+</button>
        </div>
      </div>
      <p class="stat-desc">Dexterity — improves hit chance.</p>
    </div>

    <div class="stat-block">
      <div class="stat-row">
        <span class="stat-label">AGI</span>
        <div class="stat-controls">
          <button class="stat-btn minus" data-stat="AGI">−</button>
          <span id="statValueAGI" class="stat-value"></span>
          <button class="stat-btn plus" data-stat="AGI">+</button>
        </div>
      </div>
      <p class="stat-desc">Agility — improves evade chance.</p>
    </div>

    <div class="stat-block">
      <div class="stat-row">
        <span class="stat-label">CON</span>
        <div class="stat-controls">
          <button class="stat-btn minus" data-stat="CON">−</button>
          <span id="statValueCON" class="stat-value"></span>
          <button class="stat-btn plus" data-stat="CON">+</button>
        </div>
      </div>
      <p class="stat-desc">Constitution — increases maximum HP.</p>
    </div>

    <button id="resetStatsBtn" class="reset-stat-btn">Reset</button>
    <button id="saveStatsBtn" class="save-stat-btn">Save & Close</button>
  </div>
</div>
