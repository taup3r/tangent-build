<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tangent RPG – Town Map</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/map.css">
</head>

<body>

  <div id="mapWrapper">

    <h1 class="map-title">Town of Wayfarer’s Rest</h1>

    <div id="mapGrid"></div>

    <div id="movementControls">
      <button class="move-btn" data-dir="up">▲</button>
      <div class="middle-row">
        <button class="move-btn" data-dir="left">◀</button>
        <button class="move-btn" data-dir="right">▶</button>
      </div>
      <button class="move-btn" data-dir="down">▼</button>
    </div>

    <!-- Modal -->
    <div id="locationModal" class="modal" style="display:none;">
      <div class="modal-content location-box">

        <div id="locationIcon" class="location-icon"></div>

        <h2 id="locationName"></h2>
        <p id="locationDesc"></p>

        <button id="enterLocationBtn" class="enter-btn">Enter</button>
        <button id="cancelLocationBtn" class="cancel-btn">Cancel</button>

      </div>
    </div>

  </div>

  <script type="module" src="js/map.js"></script>
</body>
</html>
