<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPG Battle</title>

  <!-- CSS SPLIT -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/modal.css">
</head>

<body>

  <!-- HEADER -->
  <div class="game-header">
    <div class="header-left">
      <span class="header-icon">⚔️</span>
      <span class="header-title">RPG Battle</span>
    </div>
  </div>

  <!-- MAIN BATTLE CONTAINER -->
  <div class="battle-container">

    <div class="battlefield">

      <!-- ENEMY CARD -->
      <div id="enemyCard" class="card enemy-card">

        <div class="portrait-container">
          <img id="enemyPortrait" class="portrait" src="">
        </div>

        <h3 id="enemyName" class="small-name"></h3>
        <p id="enemyHint" style="font-size: 0.8rem; opacity: 0.8;"></p>

        <div class="name-ap-row">
          <span>AP:</span>
          <div id="enemyAPIcons" class="ap-icon-row"></div>
        </div>

        <div class="health-bar">
          <div id="enemyHPBar" class="health-fill"></div>
          <div id="enemyHPText" class="hp-text"></div>
        </div>

      </div>

      <!-- PLAYER CARD -->
      <div id="playerCard" class="card player-card">

        <div class="portrait-container">
          <img id="playerPortrait" class="portrait" src="">
        </div>

        <h3 class="small-name">Player</h3>

        <div class="name-ap-row">
          <span>AP:</span>
          <div id="playerAPIcons" class="ap-icon-row"></div>
        </div>

        <div class="health-bar">
          <div id="playerHPBar" class="health-fill"></div>
          <div id="playerHPText" class="hp-text"></div>
        </div>

        <div class="action-row">
          <button id="attackBtn" class="btn-attack">Attack</button>
          <button id="defendBtn" class="btn-defend">Defend</button>
          <button id="skillBtn" class="btn-skill">Skill</button>
        </div>

        <button id="hitBtn" class="hit-button" style="display:none;">HIT!</button>

      </div>

    </div>
  </div>

  <!-- FLOATING DAMAGE -->
  <div id="floatingContainer"></div>

  <!-- HIDDEN LOG -->
  <pre id="log" style="display:none;"></pre>

  <!-- RESULT MODAL -->
  <div id="resultModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2 id="resultTitle"></h2>
      <div id="resultLog" class="modal-log"></div>

      <button id="statButton" class="modal-button" style="display:none;" onclick="openStatMenu()">
        Distribute Stat Points
      </button>

      <button class="modal-button" onclick="startNewBattle()">New Battle</button>
    </div>
  </div>

  <!-- STAT DISTRIBUTION MODAL -->
  <div id="statModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>Distribute Stat Points</h2>

      <p id="statPointsLeft"></p>

      <div class="stat-row">
        STR: <span id="strVal"></span>
        <button onclick="addStat('STR')">+</button>
      </div>

      <div class="stat-row">
        DEX: <span id="dexVal"></span>
        <button onclick="addStat('DEX')">+</button>
      </div>

      <div class="stat-row">
        AGI: <span id="agiVal"></span>
        <button onclick="addStat('AGI')">+</button>
      </div>

      <div class="stat-row">
        CON: <span id="conVal"></span>
        <button onclick="addStat('CON')">+</button>
      </div>

      <button class="modal-button" onclick="closeStatMenu()">Done</button>
    </div>
  </div>

  <!-- AP TOOLTIP -->
  <div id="apTooltip" class="ap-tooltip" style="display:none;"></div>

  <!-- MAIN JS ENTRY POINT -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
