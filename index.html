<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tangent RPG</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modal.css">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0f0f17;
      color: white;
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    .start-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .start-title {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 0 12px rgba(76, 255, 156, 0.6);
      color: #4cff9c;
    }

    .start-subtitle {
      font-size: 1.1rem;
      opacity: 0.8;
      margin-top: -10px;
    }

    .start-button {
      padding: 14px 20px;
      background: #4cff9c;
      border-radius: 10px;
      font-size: 1.3rem;
      cursor: pointer;
      width: 100%;
      font-weight: 700;
      border: none;
      color: #0f0f17;
      transition: 0.15s;
    }

    .start-button:hover {
      background: #3be986;
    }

    .save-list {
      background: #1c1c28;
      padding: 20px;
      border-radius: 12px;
      width: 100%;
      display: none;
      margin-top: 10px;
    }

    .save-item {
      padding: 12px;
      background: #2a2a3a;
      margin: 8px 0;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.15s;
    }

    .save-item:hover {
      background: #3a3a4a;
    }
  </style>
</head>

<body>

  <div class="start-container">
    <div class="start-title">Tangent RPG</div>
    <div class="start-subtitle">A procedural combat adventure</div>

    <button id="newGameBtn" class="start-button">New Game</button>
    <button id="continueBtn" class="start-button">Continue</button>

    <div id="saveList" class="save-list"></div>
  </div>

  <script type="module" src="js/start.js"></script>

  <script>
    history.pushState(null, "", location.href);
    window.onpopstate = function () {
      window.location.href = "index.html";
    };
  </script>
</body>
</html>
