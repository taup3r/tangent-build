<!DOCTYPE html>
<html>
<head>
  <title>Arcane Duel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>

<header class="game-header">
  <div class="header-left">
    <span class="header-icon">⚔️</span>
    <span class="header-title">Arcane Duel</span>
  </div>
</header>

<div class="battle-container">

  <div class="battlefield">

    <!-- Enemy Card -->
    <div class="card enemy-card" id="enemyCard">

      <div class="portrait-container">
        <img id="enemyPortrait" class="portrait" alt="Enemy Portrait">
      </div>

      <div class="name-ap-row">
        <div id="enemyAPIcons" class="ap-icon-row"></div>
        <h3 id="enemyName" class="small-name"></h3>
      </div>

      <div class="health-bar">
        <div id="enemyHPBar" class="health-fill"></div>
        <div id="enemyHPText" class="hp-text"></div>
      </div>

      <p id="enemyHint" class="enemy-hint"></p>

    </div>

    <!-- Player Card -->
    <div class="card player-card" id="playerCard">

      <div class="portrait-container">
        <img id="playerPortrait" class="portrait" alt="Player Portrait">
      </div>

      <div class="name-ap-row">
        <h3 class="small-name">Player</h3>
        <div id="playerAPIcons" class="ap-icon-row"></div>
      </div>

      <div class="health-bar">
        <div id="playerHPBar" class="health-fill"></div>
        <div id="playerHPText" class="hp-text"></div>
      </div>

      <div class="action-row">
        <button id="attackBtn" class="btn-attack">🗡️ Attack</button>
        <button id="defendBtn" class="btn-defend">🛡️ Defend</button>
        <button id="skillBtn" class="btn-skill">✨ Skill</button>
      </div>

      <button id="hitBtn" class="hit-button" style="display:none;">Hit!</button>

    </div>

  </div>

  <div id="log" style="display:none;"></div>

</div>

<div id="floatingContainer"></div>

<div id="resultModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h2 id="resultTitle"></h2>
    <div id="resultLog" class="modal-log"></div>
    <button class="modal-button" onclick="startNewBattle()">New Battle</button>
  </div>
</div>

<!-- JS -->
<script type="module" src="js/main.js"></script>

</body>
</html>
