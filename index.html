<!DOCTYPE html>
<html>
<head>
  <title>BattleCry RPG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="battlefield">

  <!-- Enemy Card -->
  <div class="card enemy-card" id="enemyCard">
    <div class="portrait-container">
      <img id="enemyPortrait" class="portrait" alt="Enemy Portrait">
    </div>
    <h2 id="enemyName"></h2>
    <p id="enemyHint" class="enemy-hint"></p>

    <p><strong>HP:</strong></p>
    <div class="health-bar"><div id="enemyHPBar" class="health-fill"></div></div>

    <p><strong>AP:</strong> <span id="enemyAP"></span></p>
  </div>

  <!-- Player Card -->
  <div class="card player-card" id="playerCard">
    <div class="portrait-container">
      <img id="playerPortrait" class="portrait" alt="Player Portrait">
    </div>
    <h2>Player</h2>

    <p><strong>HP:</strong></p>
    <div class="health-bar"><div id="playerHPBar" class="health-fill"></div></div>

    <p><strong>AP:</strong> <span id="ap"></span></p>

    <button id="attackBtn" onclick="playerAttack()">Attack (1 AP)</button>
    <button id="defendBtn" onclick="playerDefend()">Defend (0 AP)</button>
    <button id="skillBtn" onclick="playerSkill()">Skill (2 AP)</button>
  </div>

</div>

<!-- TIMING MINI-GAME -->
<div class="card" id="timingCard" style="display:none;">
  <p><strong>Timed Hit!</strong> Tap the button when the marker is in the green zone.</p>

  <div class="timing-bar">
    <div class="timing-zone"></div>
    <div class="timing-marker" id="timingMarker"></div>
  </div>

  <button id="timingButton" style="margin-top:10px;">HIT!</button>
</div>

<div class="card">
  <div id="log"></div>
</div>

<script src="game.js"></script>
</body>
</html>
