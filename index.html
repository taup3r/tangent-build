<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tangent RPG</title>
    <link rel="stylesheet" href="css/base.css">

    <!-- Modernised Theme -->
    <style>
        .container {
            text-align: center;
            width: 100%;
            max-width: 460px;
            padding: 40px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2.6rem;
            color: #4dd0e1;
            text-shadow: 0 0 12px rgba(77, 208, 225, 0.4);
        }

        h2 {
            margin: 0 0 30px;
            font-size: 1.1rem;
            color: #9aa0a6;
            font-weight: 400;
        }

        button {
            width: 80%;
            padding: 14px 22px;
            margin: 10px 0;
            font-size: 1.1rem;
            background: #161a1f;
            color: #e3e6eb;
            border: 1px solid #4dd0e1;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.25s ease;
        }

        button:hover {
            background: #4dd0e1;
            color: #0d0f12;
            border-color: #ffca28;
            box-shadow: 0 0 14px rgba(77, 208, 225, 0.5);
        }

        #saveList {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #161a1f;
            border: 1px solid #4dd0e1;
            border-radius: 10px;
            text-align: left;
        }

        .save-slot {
            background: #1c2127;
            border: 1px solid #2a2f36;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .save-slot:hover {
            border-color: #4dd0e1;
            background: #222830;
        }
    </style>

    <!-- External CSS (unchanged) -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/modal.css" />
</head>

<body>
    <div class="container">
        <h1>Tangent RPG</h1>
        <h2>A procedural combat adventure</h2>

        <button id="newGameBtn">New Game</button>
        <button id="continueBtn">Continue</button>

        <div id="saveList"></div>
    </div>

    <script type="module" src="js/start.js"></script>

    <script>
        history.pushState(null, "", location.href);
        window.onpopstate = function () {
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
