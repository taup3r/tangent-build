<!DOCTYPE html>
<html>
<head>
  <title>Arcane Duel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Spectral+SC:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- Fixed Header -->
<header class="game-header">
  <div class="header-left">
    <span class="header-icon">⚔️</span>
    <span class="header-title">Arcane Duel</span>
  </div>
</header>

<div class="battle-container">

  <div class="battlefield">

    <!-- Enemy Card -->
    <div class="card enemy-card" id="enemyCard">

      <div class="portrait-container">
        <img id="enemyPortrait" class="portrait" alt="Enemy Portrait">
      </div>

      <!-- Enemy Name + AP Row -->
      <div class="name-ap-row">
        <div id="enemyAPIcons" class="ap-icon-row"></div>
        <h3 id="enemyName" class="small-name"></h3>
      </div>

      <!-- HP Bar -->
      <div class="health-bar">
        <div id="enemyHPBar" class="health-fill"></div>
        <div id="enemyHPText" class="hp-text"></div>
      </div>

      <p id="enemyHint" class="enemy-hint"></p>

    </div>

    <!-- Player Card -->
    <div class="card player-card" id="playerCard">

      <div class="portrait-container">
        <img id="playerPortrait" class="portrait" alt="Player Portrait">
      </div>

      <!-- Player Name + AP Row -->
      <div class="name-ap-row">
        <h3 class="small-name">Player</h3>
        <div id="playerAPIcons" class="ap-icon-row"></div>
      </div>

      <!-- HP Bar -->
      <div class="health-bar">
        <div id="playerHPBar" class="health-fill"></div>
        <div id="playerHPText" class="hp-text"></div>
      </div>

      <!-- Action Buttons -->
      <div class="action-row">
        <button id="attackBtn" class="btn-attack" onclick="playerAttack()">🗡️ Attack</button>
        <button id="defendBtn" class="btn-defend" onclick="playerDefend()">🛡️ Defend</button>
        <button id="skillBtn" class="btn-skill" onclick="playerSkill()">✨ Skill</button>
      </div>

      <!-- Hit Button -->
      <button id="hitBtn" onclick="playerHit()" class="hit-button" style="display:none;">
        Hit!
      </button>

    </div>

  </div>

  <!-- Log Window (hidden during battle, used for modal) -->
  <div class="card" style="display:none;">
    <div id="log"></div>
  </div>

</div>

<!-- Floating Damage Container -->
<div id="floatingContainer"></div>

<!-- Victory/Defeat Modal -->
<div id="resultModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h2 id="resultTitle"></h2>
    <div id="resultLog" class="modal-log"></div>
    <button class="modal-button" onclick="startNewBattle()">New Battle</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
